#low level settings for development server
webrick:
  headers:
    Access-Control-Allow-Origin: "*"



hero:
  autoplay_ms: 5000   # milliseconds between slides (0 = no autoplay)
  slides:
    - image: /images/hero/hero1.png
      title: "Experiential Learning at Scale"
      subtitle: "Real-scale experiences for real-world skill development"
      link: /articles/
      cta: "Browse our Experiential Learning Articles Database"
    
    - image: /images/hero/hero2.png
      title: "High Definition Simulation Environments"
      subtitle: "Bring complex systems to life with open-source simulation software"
      link: /solutions/
      cta: "Find Open Source Digital Solutions"
    
    - image: /images/hero/hero3.png
      title: "Promoting Cross Experiential Simulations"
      subtitle: "PractiCity Microverse : where all experiential simulations are virtually gathered"
      link: /microverse/
      cta: "Understanding PractiCity Microverse"







#
# !! You don't need to change any of the configuration flags below !!
#

permalink: /:title/

# The release of Jekyll Now that you're using
version: v1.2.0

# Jekyll 3 now only supports Kramdown for Markdown
kramdown:
  # Use GitHub flavored markdown, including triple backtick fenced code blocks
  input: GFM
  # Jekyll 3 and GitHub Pages now only support rouge for syntax highlighting
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    # Use existing pygments syntax highlighting css
    css_class: 'highlight'

# Set the Sass partials directory, as we're using @imports
sass:
  style: :expanded # You might prefer to minify using :compressed

# Use the following plug-ins
gems:
  - jekyll-sitemap # Create a sitemap using the official Jekyll sitemap gem
  - jekyll-feed # Create an Atom feed using the official Jekyll feed gem

# Exclude these files from your production _site
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME

theme: minimal-mistakes-jekyll



