#for local testing use this backend
#backend:
#    name: proxy
#    branch: main
#    proxy_url: http://localhost:8081/api/v1

#for production use this backend
backend:
    name: github
    branch: main
    repo: practicity/content
    auth_type: pkce
    app_id: Ov23liZ6JqKsDEAFA8lO #GITHUB_OAUTH_APP_CLIENT_ID


media_folder: "/images"
public_folder: "/images"


collections:
  - name: "articles"
    label: "Articles"
    folder: "_articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    media_folder: "/images/articles"
    public_folder: "/images/articles"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "article"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["Interview", "Tutorial", "Showcase", "Commercial Showcase", "Video Coverage", "Uncommented Video Coverage", "Short Movie", "Seminar", "Article", "Case Study", "Research", "Other"]
      - {label: "Original URL", name: "original", widget: "string", required: false}
      - {label: "Created On", name: "created_on", widget: "string", hint: "e.g. April 1, 2026"}
      - {label: "Contributor ID", name: "contributor_id", widget: "string"}
      - {label: "Screenshot 1", name: "screenshot1", widget: "image", required: false}
      - {label: "Screenshot 2", name: "screenshot2", widget: "image", required: false}
      - {label: "Abstract", name: "Abstract", widget: "text", required: false}
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
      - label: "Location IDs"
        name: "locationids"
        widget: "list"
        allow_add: true
      - {label: "Comments", name: "comments", widget: "boolean", default: true}
      - {label: "Body", name: "body", widget: "markdown", required: false}

  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    media_folder: "/images/posts"
    public_folder: "/images/posts"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Contributor ID", name: "contributor_id", widget: "string"}
      - {label: "Screenshot 1", name: "screenshot1", widget: "image", required: false}
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
      - {label: "Comments", name: "comments", widget: "boolean", default: true}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "solutions"
    label: "Solutions"
    folder: "_solutions"
    create: true
    slug: "{{slug}}"
    media_folder: "/images/solutions"
    public_folder: "/images/solutions"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "solution"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Type", name: "type", widget: "string", default: "Simulation Software"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Complexity", name: "complexity", widget: "string", hint: "e.g. ★★★★★"}
      - {label: "Activity", name: "activity", widget: "string", hint: "e.g. ★★★★★"}
      - {label: "Website", name: "website", widget: "string", required: false}
      - {label: "GitHub / Source", name: "github", widget: "string", required: false}
      - {label: "License", name: "license", widget: "string", required: false}
      - {label: "Last Survey", name: "last_survey", widget: "string", hint: "e.g. March 24, 2026"}
      - {label: "Screenshot 1", name: "screenshot1", widget: "image", required: false}
      - {label: "Screenshot 2", name: "screenshot2", widget: "image", required: false}
      - {label: "Screenshot 3", name: "screenshot3", widget: "image", required: false}
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
      - label: "Location IDs"
        name: "locationids"
        widget: "list"
        allow_add: true
      - {label: "Contributor ID", name: "contributor_id", widget: "string"}
      - {label: "Comments", name: "comments", widget: "boolean", default: true}
      - {label: "Body", name: "body", widget: "markdown", required: false}

  - name: "locations"
    label: "Locations"
    folder: "_locations"
    create: true
    slug: "{{fields.locationid}}"
    identifier_field: name
    media_folder: "/images/locations"
    public_folder: "/images/locations"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "location"}
      - {label: "Location ID", name: "locationid", widget: "string"}
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Screenshot", name: "screenshot1", widget: "image", required: false}
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
      - {label: "Contributor ID", name: "contributor_id", widget: "string"}
      - {label: "Comments", name: "comments", widget: "boolean", default: true}
      - {label: "Body", name: "body", widget: "markdown", required: false}