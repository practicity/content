---
layout: null
---

{% if site.cms_local %} #if the cms_local flag is set in _config.local.yml, use the local proxy backend for testing, otherwise use the production github backend
# LOCAL DEVELOPMENT CONFIG
local_backend: true
{% endif %}

backend:
    name: {{ site.cms_backend.name }}
    branch: {{ site.cms_backend.branch }}
    repo: {{ site.cms_backend.repo }}
    base_url: {{ site.cms_backend.oauth_base_url }}


media_folder: "/images"
public_folder: "/images"


collections:

  # ─────────────────────────────────────────────
  # ARTICLES
  # ─────────────────────────────────────────────
  - name: "articles"
    label: "Articles"
    folder: "_articles"
    create: true
    identifier_field: title
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "articles/{{slug}}"
    media_folder: "/images/articles"
    public_folder: "/images/articles"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "article"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["Article", "Case Study", "Commercial Showcase", "Interview", "Other", "Research", "Seminar", "Short Movie", "Showcase", "Tutorial", "Uncommented Video Coverage", "Video Coverage"]
      - {label: "Original URL", name: "original", widget: "string", required: false}
      - label: "Created On"
        name: "created_on"
        widget: "datetime"
        date_format: "MMMM D, YYYY"
        time_format: false
        picker_utc: false
      - label: "Contributor"
        name: "contributor_id"
        widget: "select"
        options:
          - {label: "Alexandre Gain", value: "alexandre-gain"}
          - {label: "Chriss Costa", value: "chriss-costa"}
          - {label: "Practi Citizen", value: "practi-citizen"}
      - {label: "Screenshot 1", name: "screenshot1", widget: "image", required: false}
      - {label: "Screenshot 1 – Description", name: "screenshot1_description", widget: "string", required: false, hint: "Caption / alt text for the image"}
      - {label: "Screenshot 1 – Credit", name: "screenshot1_credit", widget: "string", required: false, hint: "Attribution (e.g. © Author, CC BY 4.0)"}
      - {label: "Screenshot 2", name: "screenshot2", widget: "image", required: false}
      - {label: "Screenshot 2 – Description", name: "screenshot2_description", widget: "string", required: false, hint: "Caption / alt text for the image"}
      - {label: "Screenshot 2 – Credit", name: "screenshot2_credit", widget: "string", required: false, hint: "Attribution (e.g. © Author, CC BY 4.0)"}
      - {label: "Abstract", name: "Abstract", widget: "markdown", required: false}
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options: ["3D-Modeling", "Active-Learning", "Aerospace", "AI", "Assessment", "Aviation", "Big-Data", "Blended-Learning", "Business-Administration", "C#", "C++", "CAD/CAM", "Chemistry", "Cloud-Computing", "CNC", "Communication", "Community", "Conflict-Resolution", "Construction", "Corporate-Training", "Creativity", "Criminal-Justice", "Crisis-Management", "Curriculum-Design", "Customer-Service", "Data-Analytics", "Debriefing", "Decision-Making", "De-escalation", "Delphi", "Digital-Twin", "Economics", "Emergency-Response", "Energy", "Experiential-Learning", "FEM", "Fluid-Dynamics", "Fortran", "Game-Based", "GIS", "Healthcare", "Information-Systems", "Instructional-Design", "IoT", "Java", "JavaScript", "Law", "Leadership", "Logistics", "Manufacturing", "Maritime", "Mathematics", "Medical", "Negotiation", "Networking", "Nursing", "Pascal", "Patient-Safety", "PHP", "Physics", "Police-Training", "Policy", "Python", "Reflective-Practice", "Robotics", "Roleplay", "Simulated-Workplace", "Simulation", "Simulator", "Teamwork", "Thermodynamics", "Urban-Planning", "Visualization", "VR/AR", "Workforce-Development"]
      - label: "Location IDs"
        name: "locationids"
        widget: "select"
        multiple: true
        required: false
        options: ["13THFL", "ARTWAPT", "ARTWATC", "CINEMATRIX", "CITYHALL", "COURT", "DEBRIEF", "DERRICK", "DEWEY", "DGHOSP", "ENDER", "ERICSSON", "FINSIM", "FIREST", "HOMERNPP", "KEMSYM", "KOLBLIB", "MATHESIS", "MURPHY", "PANSIM", "PIAGET", "POLICEST", "PRACTIPORT", "PRAXIS", "RASMUSSEN", "SIMFAC", "SMOGSIDE", "STEELRISE", "TRUMAN", "WBUSC"]
      - {label: "Comments", name: "comments", widget: "boolean", default: true}

  # ─────────────────────────────────────────────
  # POSTS
  # ─────────────────────────────────────────────
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    identifier_field: title
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "{{slug}}"
    media_folder: "/images/posts"
    public_folder: "/images/posts"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Title", name: "title", widget: "string"}
      - label: "Contributor"
        name: "contributor_id"
        widget: "select"
        options:
          - {label: "Alexandre Gain", value: "alexandre-gain"}
          - {label: "Chriss Costa", value: "chriss-costa"}
          - {label: "Practi Citizen", value: "practi-citizen"}
      - {label: "Screenshot 1", name: "screenshot1", widget: "image", required: false}
      - {label: "Screenshot 1 – Description", name: "screenshot1_description", widget: "string", required: false, hint: "Caption / alt text for the image"}
      - {label: "Screenshot 1 – Credit", name: "screenshot1_credit", widget: "string", required: false, hint: "Attribution (e.g. © Author, CC BY 4.0)"}
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options: ["3D-Modeling", "Active-Learning", "Aerospace", "AI", "Assessment", "Aviation", "Big-Data", "Blended-Learning", "Business-Administration", "C#", "C++", "CAD/CAM", "Chemistry", "Cloud-Computing", "CNC", "Communication", "Community", "Conflict-Resolution", "Construction", "Corporate-Training", "Creativity", "Criminal-Justice", "Crisis-Management", "Curriculum-Design", "Customer-Service", "Data-Analytics", "Debriefing", "Decision-Making", "De-escalation", "Delphi", "Digital-Twin", "Economics", "Emergency-Response", "Energy", "Experiential-Learning", "FEM", "Fluid-Dynamics", "Fortran", "Game-Based", "GIS", "Healthcare", "Information-Systems", "Instructional-Design", "IoT", "Java", "JavaScript", "Law", "Leadership", "Logistics", "Manufacturing", "Maritime", "Mathematics", "Medical", "Negotiation", "Networking", "Nursing", "Pascal", "Patient-Safety", "PHP", "Physics", "Police-Training", "Policy", "Python", "Reflective-Practice", "Robotics", "Roleplay", "Simulated-Workplace", "Simulation", "Simulator", "Teamwork", "Thermodynamics", "Urban-Planning", "Visualization", "VR/AR", "Workforce-Development"]
      - {label: "Comments", name: "comments", widget: "boolean", default: true}
      - {label: "Body", name: "body", widget: "markdown"}

  # ─────────────────────────────────────────────
  # SOLUTIONS
  # ─────────────────────────────────────────────
  - name: "solutions"
    label: "Solutions"
    folder: "_solutions"
    create: true
    identifier_field: title
    slug: "{{slug}}"
    preview_path: "solutions/{{slug}}"
    media_folder: "/images/solutions"
    public_folder: "/images/solutions"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "solution"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Type", name: "type", widget: "string", default: "Simulation Software"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Complexity", name: "complexity", widget: "string", hint: "e.g. ★★★★★"}
      - {label: "Activity", name: "activity", widget: "string", hint: "e.g. ★★★★★"}
      - {label: "Website", name: "website", widget: "string", required: false}
      - {label: "GitHub / Source", name: "github", widget: "string", required: false}
      - {label: "License", name: "license", widget: "string", required: false}
      - label: "Last Survey"
        name: "last_survey"
        widget: "datetime"
        date_format: "MMMM D, YYYY"
        time_format: false
        picker_utc: false
      - {label: "Screenshot 1", name: "screenshot1", widget: "image", required: false}
      - {label: "Screenshot 1 – Description", name: "screenshot1_description", widget: "string", required: false, hint: "Caption / alt text for the image"}
      - {label: "Screenshot 1 – Credit", name: "screenshot1_credit", widget: "string", required: false, hint: "Attribution (e.g. © Author, CC BY 4.0)"}
      - {label: "Screenshot 2", name: "screenshot2", widget: "image", required: false}
      - {label: "Screenshot 2 – Description", name: "screenshot2_description", widget: "string", required: false, hint: "Caption / alt text for the image"}
      - {label: "Screenshot 2 – Credit", name: "screenshot2_credit", widget: "string", required: false, hint: "Attribution (e.g. © Author, CC BY 4.0)"}
      - {label: "Screenshot 3", name: "screenshot3", widget: "image", required: false}
      - {label: "Screenshot 3 – Description", name: "screenshot3_description", widget: "string", required: false, hint: "Caption / alt text for the image"}
      - {label: "Screenshot 3 – Credit", name: "screenshot3_credit", widget: "string", required: false, hint: "Attribution (e.g. © Author, CC BY 4.0)"}
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options: ["3D-Modeling", "Active-Learning", "Aerospace", "AI", "Assessment", "Aviation", "Big-Data", "Blended-Learning", "Business-Administration", "C#", "C++", "CAD/CAM", "Chemistry", "Cloud-Computing", "CNC", "Communication", "Community", "Conflict-Resolution", "Construction", "Corporate-Training", "Creativity", "Criminal-Justice", "Crisis-Management", "Curriculum-Design", "Customer-Service", "Data-Analytics", "Debriefing", "Decision-Making", "De-escalation", "Delphi", "Digital-Twin", "Economics", "Emergency-Response", "Energy", "Experiential-Learning", "FEM", "Fluid-Dynamics", "Fortran", "Game-Based", "GIS", "Healthcare", "Information-Systems", "Instructional-Design", "IoT", "Java", "JavaScript", "Law", "Leadership", "Logistics", "Manufacturing", "Maritime", "Mathematics", "Medical", "Negotiation", "Networking", "Nursing", "Pascal", "Patient-Safety", "PHP", "Physics", "Police-Training", "Policy", "Python", "Reflective-Practice", "Robotics", "Roleplay", "Simulated-Workplace", "Simulation", "Simulator", "Teamwork", "Thermodynamics", "Urban-Planning", "Visualization", "VR/AR", "Workforce-Development"]
      - label: "Location IDs"
        name: "locationids"
        widget: "select"
        multiple: true
        required: false
        options: ["13THFL", "ARTWAPT", "ARTWATC", "CINEMATRIX", "CITYHALL", "COURT", "DEBRIEF", "DERRICK", "DEWEY", "DGHOSP", "ENDER", "ERICSSON", "FINSIM", "FIREST", "HOMERNPP", "KEMSYM", "KOLBLIB", "MATHESIS", "MURPHY", "PANSIM", "PIAGET", "POLICEST", "PRACTIPORT", "PRAXIS", "RASMUSSEN", "SIMFAC", "SMOGSIDE", "STEELRISE", "TRUMAN", "WBUSC"]
      - label: "Contributor"
        name: "contributor_id"
        widget: "select"
        options:
          - {label: "Alexandre Gain", value: "alexandre-gain"}
          - {label: "Chriss Costa", value: "chriss-costa"}
          - {label: "Practi Citizen", value: "practi-citizen"}
      - {label: "Comments", name: "comments", widget: "boolean", default: true}
      - {label: "Body", name: "body", widget: "markdown", required: false}

  # ─────────────────────────────────────────────
  # LOCATIONS
  # ─────────────────────────────────────────────
  - name: "locations"
    label: "Locations"
    folder: "_locations"
    create: true
    slug: "{{fields.locationid}}"
    identifier_field: name
    preview_path: "locations/{{slug}}"
    media_folder: "/images/locations"
    public_folder: "/images/locations"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "location"}
      - {label: "Location ID", name: "locationid", widget: "string", hint: "Uppercase, no spaces (e.g. CITYHALL)"}
      - {label: "Name", name: "name", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Screenshot", name: "screenshot1", widget: "image", required: false}
      - {label: "Screenshot – Description", name: "screenshot1_description", widget: "string", required: false, hint: "Caption / alt text for the image"}
      - {label: "Screenshot – Credit", name: "screenshot1_credit", widget: "string", required: false, hint: "Attribution (e.g. © Author, CC BY 4.0)"}
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options: ["3D-Modeling", "Active-Learning", "Aerospace", "AI", "Assessment", "Aviation", "Big-Data", "Blended-Learning", "Business-Administration", "C#", "C++", "CAD/CAM", "Chemistry", "Cloud-Computing", "CNC", "Communication", "Community", "Conflict-Resolution", "Construction", "Corporate-Training", "Creativity", "Criminal-Justice", "Crisis-Management", "Curriculum-Design", "Customer-Service", "Data-Analytics", "Debriefing", "Decision-Making", "De-escalation", "Delphi", "Digital-Twin", "Economics", "Emergency-Response", "Energy", "Experiential-Learning", "FEM", "Fluid-Dynamics", "Fortran", "Game-Based", "GIS", "Healthcare", "Information-Systems", "Instructional-Design", "IoT", "Java", "JavaScript", "Law", "Leadership", "Logistics", "Manufacturing", "Maritime", "Mathematics", "Medical", "Negotiation", "Networking", "Nursing", "Pascal", "Patient-Safety", "PHP", "Physics", "Police-Training", "Policy", "Python", "Reflective-Practice", "Robotics", "Roleplay", "Simulated-Workplace", "Simulation", "Simulator", "Teamwork", "Thermodynamics", "Urban-Planning", "Visualization", "VR/AR", "Workforce-Development"]
      - label: "Contributor"
        name: "contributor_id"
        widget: "select"
        options:
          - {label: "Alexandre Gain", value: "alexandre-gain"}
          - {label: "Chriss Costa", value: "chriss-costa"}
          - {label: "Practi Citizen", value: "practi-citizen"}
      - {label: "Comments", name: "comments", widget: "boolean", default: true}
      - {label: "Body", name: "body", widget: "markdown", required: false}

  # ─────────────────────────────────────────────
  # CONTRIBUTORS
  # ─────────────────────────────────────────────
  - name: "contributors"
    label: "Contributors"
    folder: "_contributors"
    create: true
    identifier_field: title
    slug: "{{fields.contributor_id}}"
    preview_path: "contributors/{{slug}}"
    media_folder: "/images/contributors"
    public_folder: "/images/contributors"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "contributor"}
      - {label: "Full Name", name: "title", widget: "string"}
      - {label: "Contributor ID", name: "contributor_id", widget: "string", required: true, hint: "Lowercase, hyphens only — used as filename and referenced site-wide (e.g. chriss-costa)"}
      - {label: "Byline", name: "byline", widget: "string", required: false, hint: "Short tagline displayed under the name"}
      - {label: "Country", name: "country", widget: "string", required: false}
      - {label: "City", name: "city", widget: "string", required: false}
      - {label: "Headshot", name: "headshot", widget: "image", required: false}
      - {label: "Headshot – Description", name: "headshot_description", widget: "string", required: false, hint: "Alt text for the photo"}
      - {label: "Headshot – Credit", name: "headshot_credit", widget: "string", required: false, hint: "Attribution (e.g. © Photographer Name)"}
      - label: "Social Links"
        name: "social"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - {label: "LinkedIn", name: "linkedin", widget: "string", required: false}
          - {label: "GitHub", name: "github", widget: "string", required: false}
          - {label: "Twitter / X", name: "twitter", widget: "string", required: false}
          - {label: "Instagram", name: "instagram", widget: "string", required: false}
          - {label: "YouTube", name: "youtube", widget: "string", required: false}
          - {label: "Website", name: "website", widget: "string", required: false}
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options: ["3D-Modeling", "Active-Learning", "Aerospace", "AI", "Assessment", "Aviation", "Big-Data", "Blended-Learning", "Business-Administration", "C#", "C++", "CAD/CAM", "Chemistry", "Cloud-Computing", "CNC", "Communication", "Community", "Conflict-Resolution", "Construction", "Corporate-Training", "Creativity", "Criminal-Justice", "Crisis-Management", "Curriculum-Design", "Customer-Service", "Data-Analytics", "Debriefing", "Decision-Making", "De-escalation", "Delphi", "Digital-Twin", "Economics", "Emergency-Response", "Energy", "Experiential-Learning", "FEM", "Fluid-Dynamics", "Fortran", "Game-Based", "GIS", "Healthcare", "Information-Systems", "Instructional-Design", "IoT", "Java", "JavaScript", "Law", "Leadership", "Logistics", "Manufacturing", "Maritime", "Mathematics", "Medical", "Negotiation", "Networking", "Nursing", "Pascal", "Patient-Safety", "PHP", "Physics", "Police-Training", "Policy", "Python", "Reflective-Practice", "Robotics", "Roleplay", "Simulated-Workplace", "Simulation", "Simulator", "Teamwork", "Thermodynamics", "Urban-Planning", "Visualization", "VR/AR", "Workforce-Development"]
