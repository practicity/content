name: Practi.City
description: "A Volunteer Community for Experiential Learning & Open-Source Simulators"
avatar: /images/practicity_tmp_logo.jpg

collections:
  locations:
    output: true
    permalink: /locations/:name/
  solutions:
    output: true
    permalink: /solutions/:name/
  articles:
    output: true
    permalink: /articles/:name/
  tags:
    output: true
    permalink: /tags/:name/
  contributors:
    output: true
    permalink: /contributors/:name/


# Includes an icon in the footer for each username you enter
footer-links:
  dribbble:
  email: hello@practi.city
  facebook:
  flickr:
  github: organizations/practicity/
  instagram:
  linkedin:
  pinterest:
  rss: # just type anything here for a working RSS icon
  twitter:
  stackoverflow: # your stackoverflow profile, e.g. "users/50476/bart-kiers"
  youtube: # channel/<your_long_string> or user/<user-name>
  googleplus: # anything in your profile username that comes after plus.google.com/

# Giscus comments (GitHub Discussions)
# Get repo_id and category_id from https://giscus.app — enter your repo and copy the values.
# repo: GitHub repo where Discussions are enabled, in "owner/repo" format
# mapping: how pages map to discussions — "pathname" is recommended
# reactions_enabled: 1 to show emoji reactions on the discussion post, 0 to hide
# theme: preferred_color_scheme | light | dark | transparent_dark | ...
giscus:
  repo: "practicity/discussions"
  repo_id: "R_kgDOSKCFzw"
  category: "General"
  category_id: "DIC_kwDOSKCFz84C7doT"
  mapping: "pathname"
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "bottom"
  theme: "light"
  lang: "en"

# Enter your Google Analytics web tracking code (e.g. UA-2110908-2) to activate tracking
google_analytics:

# Used for Sitemap.xml and your RSS feed
url: "https://practi.city"

# Microverse base URL
microverse_url: "https://microverse.practi.city"

# CMS backend (referenced by admin/config.yml via Liquid)
cms_backend:
  name: github
  branch: main
  repo: practicity/content
  # OAuth proxy — deploy cloudflare-oauth/worker.js then set this to your Worker URL
  oauth_base_url: "https://practicity-cms-oauth.alexandre-gain.workers.dev"

# Homepage display counts
homepage:
  news_count: 4
  articles_count: 2
  solutions_count: 2
  locations_count: 2


# If you're hosting your site at a Project repository on GitHub pages
# (http://yourusername.github.io/repository-name)
# and NOT your User repository (http://yourusername.github.io)
# then add in the baseurl here, like this: "/repository-name"
baseurl: ""










#
# !! You don't need to change any of the configuration flags below !!
#

permalink: /:title/

# The release of Jekyll Now that you're using
version: v1.2.0

# Jekyll 3 now only supports Kramdown for Markdown
kramdown:
  # Use GitHub flavored markdown, including triple backtick fenced code blocks
  input: GFM
  # Jekyll 3 and GitHub Pages now only support rouge for syntax highlighting
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    # Use existing pygments syntax highlighting css
    css_class: 'highlight'

# Set the Sass partials directory, as we're using @imports
sass:
  style: :expanded # You might prefer to minify using :compressed
  quiet_deps: true

# Use the following plug-ins
gems:
  - jekyll-sitemap # Create a sitemap using the official Jekyll sitemap gem
  - jekyll-feed # Create an Atom feed using the official Jekyll feed gem

# Exclude these files from your production _site
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME

theme: minimal-mistakes-jekyll